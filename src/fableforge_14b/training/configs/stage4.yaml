stage3_adapter: "output/stage3"
dataset_path: "data/dpo_preferences.jsonl"
output_dir: "output/stage4"

LoRA_r: 16
LoRA_alpha: 32
LoRA_dropout: 0.05
LoRA_target_modules:
  - q_proj
  - v_proj

batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 0.00003
num_epochs: 1
max_seq_length: 8192
warmup_ratio: 0.03
weight_decay: 0.01
lr_scheduler_type: "cosine"

save_steps: 200
eval_steps: 200
logging_steps: 10

bf16: true
seed: 42

dpo_beta: 0.1
dpo_loss_type: "sigmoid"
dpo_label_smoothing: 0.0
max_prompt_length: 2048
max_chosen_length: 4096
max_rejected_length: 4096
reference_free: false